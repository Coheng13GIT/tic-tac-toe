<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg: #0b0420;
    --panel: rgba(30, 12, 60, 0.55);
    --line: #ff2e97;
    --x: #2de2e6;
    --o: #ff6ad5;
    --text: #e7e0ff;
    --accent: #f706cf;
    --neon: #00f0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", ui-monospace, monospace;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    overflow: hidden;
  }

  /* ---- Per-theme palettes ---- */
  /* Plain: clean, minimal, no neon glow — the default */
  body[data-theme="plain"] {
    --bg: #11141a; --x: #4a9eff; --o: #ff6b6b; --text: #e8eaed;
    --accent: #4a9eff; --neon: #9aa3b0; --line: #2a2f3a;
  }
  body[data-theme="christmas"] {
    --bg: #06121f; --x: #ff4d4d; --o: #4ade80; --text: #eafff0;
    --accent: #ff3b3b; --neon: #7fffd4; --line: #ff4d4d;
  }
  body[data-theme="halloween"] {
    --bg: #100614; --x: #ff8c1a; --o: #b14aff; --text: #ffe9d6;
    --accent: #ff7518; --neon: #ff8c1a; --line: #b14aff;
  }
  body[data-theme="sakura"] {
    --bg: #1a0f1c; --x: #ff9ecb; --o: #ffd1e8; --text: #fff0f6;
    --accent: #ff6fae; --neon: #ffb7d5; --line: #ff9ecb;
  }
  body[data-theme="matrix"] {
    --bg: #000800; --x: #00ff66; --o: #b6ff00; --text: #c8ffd4;
    --accent: #00ff66; --neon: #00ff66; --line: #00ff66;
  }

  /* ---- Background (themed gradient) ---- */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -3;
    background:
      linear-gradient(180deg, #2b0a4a 0%, #5c0b6e 38%, #b3146e 55%, #1a0633 56%, #0b0420 100%);
  }
  body[data-theme="christmas"] .bg { background: linear-gradient(180deg, #02060f 0%, #0a2540 55%, #123a5e 100%); }
  body[data-theme="halloween"] .bg { background: linear-gradient(180deg, #1a0a1f 0%, #3d1a0a 60%, #100614 100%); }
  body[data-theme="sakura"] .bg { background: linear-gradient(180deg, #2a1430 0%, #5e2a4e 55%, #1a0f1c 100%); }
  body[data-theme="matrix"] .bg { background: linear-gradient(180deg, #001400 0%, #000a00 100%); }
  body[data-theme="plain"] .bg { background: linear-gradient(180deg, #161a22 0%, #0e1116 100%); }

  /* synthwave-only sun + grid: hidden unless synthwave theme is active */
  .sun, .grid { display: none; }
  body[data-theme="synthwave"] .sun, body[data-theme="synthwave"] .grid { display: block; }

  /* ---- Plain theme: strip neon glow + retro overlays for a clean look ---- */
  body[data-theme="plain"] .scanlines { display: none; }
  body[data-theme="plain"] h1 { text-shadow: none; animation: none; color: var(--text); }
  body[data-theme="plain"] .subtitle { text-shadow: none; color: #9aa3b0; }
  body[data-theme="plain"] .screen { background: rgba(20, 24, 31, 0.92); border-color: var(--line); box-shadow: 0 12px 40px rgba(0,0,0,.45); }
  body[data-theme="plain"] .btn { box-shadow: none; text-shadow: none; }
  body[data-theme="plain"] .btn:hover { box-shadow: none; }
  body[data-theme="plain"] #status { text-shadow: none; }
  body[data-theme="plain"] .score b { text-shadow: none; }
  body[data-theme="plain"] .cell.x, body[data-theme="plain"] .cell.o { text-shadow: none; }
  body[data-theme="plain"] #board { box-shadow: 0 8px 30px rgba(0,0,0,.5); background: var(--line); }
  body[data-theme="plain"] .cell.win { box-shadow: none; animation: none; }

  /* ---- Christmas: frosty, snow-dusted text ---- */
  body[data-theme="christmas"] h1 {
    color: #f2fbff;
    text-shadow: 0 1px 0 #cdeeff, 0 2px 2px #a9d8f5, 0 0 14px rgba(200,235,255,.75), 0 3px 8px rgba(120,180,230,.5);
    animation: none;
  }
  body[data-theme="christmas"] .subtitle { color: #bfe6ff; text-shadow: 0 0 10px rgba(190,230,255,.7); }

  /* ---- Halloween: cobwebs in the corners + eerie flickering title ---- */
  #cobwebs { position: fixed; inset: 0; z-index: 45; pointer-events: none; display: none; }
  body[data-theme="halloween"] #cobwebs { display: block; }
  #cobwebs .web { position: absolute; width: 160px; height: 160px; opacity: .55; }
  #cobwebs .web svg { width: 100%; height: 100%; display: block; }
  .web.tl { top: 0; left: 0; }
  .web.tr { top: 0; right: 0; transform: scaleX(-1); }
  .web.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .web.br { bottom: 0; right: 0; transform: scale(-1, -1); }
  body[data-theme="halloween"] h1 {
    color: #ff9a3b;
    text-shadow: 0 0 8px #ff7518, 0 0 22px #ff5500, 0 0 40px #b14aff;
    animation: spooky 3.5s infinite;
  }
  @keyframes spooky {
    0%, 19%, 21%, 55%, 57%, 100% { opacity: 1; }
    20% { opacity: .35; } 56% { opacity: .5; } 80% { opacity: .85; }
  }

  /* ---- Sakura: soft pink bloom ---- */
  body[data-theme="sakura"] h1 {
    color: #fff0f6;
    text-shadow: 0 0 12px #ff9ecb, 0 0 26px rgba(255,158,203,.7);
    animation: none;
  }
  body[data-theme="sakura"] .screen { box-shadow: 0 0 36px rgba(255,158,203,.28), inset 0 0 50px rgba(60,20,45,.5); }

  /* ---- Matrix: bright terminal-green glow + subtle flicker ---- */
  body[data-theme="matrix"] h1 {
    color: #aaffaa;
    text-shadow: 0 0 6px #00ff66, 0 0 16px #00ff66, 0 0 30px #00ff66;
    animation: termflick 2.5s infinite;
  }
  @keyframes termflick { 0%, 100% { opacity: 1; } 97% { opacity: 1; } 98% { opacity: .7; } 99% { opacity: 1; } }
  body[data-theme="matrix"] .cell { font-family: "Courier New", monospace; }
  /* glowing sun */
  .sun {
    position: fixed;
    left: 50%;
    top: 26%;
    width: 340px;
    height: 340px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: linear-gradient(180deg, #ffe53b 0%, #ff9a3b 40%, #ff2e97 75%);
    box-shadow: 0 0 90px 30px rgba(255, 90, 170, 0.45);
    z-index: -2;
    -webkit-mask-image: repeating-linear-gradient(180deg, #000 0 14px, transparent 14px 20px);
    mask-image: repeating-linear-gradient(180deg, #000 0 14px, transparent 14px 20px);
    animation: sunPulse 5s ease-in-out infinite;
  }
  @keyframes sunPulse { 50% { box-shadow: 0 0 120px 45px rgba(255, 120, 200, 0.6); } }
  /* perspective neon grid floor */
  .grid {
    position: fixed;
    left: -50%;
    right: -50%;
    bottom: -10%;
    height: 60%;
    z-index: -1;
    background-image:
      linear-gradient(rgba(255, 46, 151, 0.6) 2px, transparent 2px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.5) 2px, transparent 2px);
    background-size: 60px 60px;
    transform: perspective(340px) rotateX(68deg);
    transform-origin: center bottom;
    animation: scroll 1.4s linear infinite;
    mask-image: linear-gradient(transparent, #000 40%);
    -webkit-mask-image: linear-gradient(transparent, #000 40%);
  }
  @keyframes scroll { from { background-position: 0 0; } to { background-position: 0 60px; } }
  /* scanline overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.18) 2px 4px);
    mix-blend-mode: multiply;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
    animation: fade .25s ease;
    /* readable glass panel so content doesn't clash with the busy background */
    padding: 40px 48px;
    border-radius: 20px;
    background: rgba(8, 3, 22, 0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(0, 240, 255, 0.35);
    box-shadow: 0 0 30px rgba(0, 240, 255, 0.18), inset 0 0 40px rgba(11, 4, 32, 0.6);
  }
  .screen.active { display: flex; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  h1 {
    margin: 0;
    font-size: 2.6rem;
    letter-spacing: 3px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 6px var(--neon), 0 0 14px var(--neon), 0 0 28px var(--accent);
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: .6; } 94% { opacity: 1; } 96% { opacity: .7; } 97% { opacity: 1; }
  }
  .subtitle { opacity: .8; margin-top: -16px; font-size: 1rem; letter-spacing: 2px; color: var(--o); text-shadow: 0 0 8px var(--o); }

  /* ---- Settings controls ---- */
  .setting { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .setting label { font-size: 1.05rem; letter-spacing: 1px; color: var(--neon); text-shadow: 0 0 8px var(--neon); }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 260px; height: 8px; border-radius: 6px;
    background: rgba(0,240,255,.2); border: 1px solid var(--neon); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--neon); box-shadow: 0 0 12px var(--neon); cursor: pointer;
  }
  .statsList { display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px; border-radius: 10px;
    background: rgba(11,4,32,.5); border: 1px solid rgba(0,240,255,.25);
  }
  .stat-row .label { letter-spacing: 1px; opacity: .9; }
  .stat-row .value { font-size: 1.3rem; font-weight: 700; color: var(--neon); text-shadow: 0 0 8px var(--neon); }
  .themeGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .theme-swatch {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 18px; border-radius: 12px; cursor: pointer;
    background: rgba(11,4,32,.5); border: 2px solid transparent;
    font-family: inherit; color: var(--text); font-size: .95rem; transition: all .15s ease;
    min-width: 130px;
  }
  .theme-swatch:hover { transform: translateY(-2px); }
  .theme-swatch.selected { border-color: var(--neon); box-shadow: 0 0 16px rgba(0,240,255,.5); }
  .theme-swatch .dot { font-size: 1.6rem; }

  /* ---- Falling particles (snow / bats / petals / matrix) ---- */
  #particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; top: -40px; user-select: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(var(--spin, 360deg)); }
  }

  button.btn {
    background: transparent;
    color: var(--neon);
    border: 2px solid var(--neon);
    padding: 14px 28px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-shadow: 0 0 8px var(--neon);
    box-shadow: 0 0 10px rgba(0,240,255,.35), inset 0 0 10px rgba(0,240,255,.15);
    transition: all .15s ease;
    min-width: 240px;
  }
  button.btn:hover { background: var(--neon); color: #0b0420; text-shadow: none; transform: translateY(-2px); box-shadow: 0 0 22px var(--neon); }
  button.btn.ghost {
    color: var(--o);
    border-color: var(--o);
    text-shadow: 0 0 8px var(--o);
    box-shadow: 0 0 8px rgba(255,106,213,.3);
    min-width: auto;
    padding: 10px 20px;
    font-size: 1rem;
  }
  button.btn.ghost:hover { background: var(--o); color: #0b0420; box-shadow: 0 0 20px var(--o); }
  .menu { display: flex; flex-direction: column; gap: 14px; }

  #status { font-size: 1.2rem; min-height: 1.5em; font-weight: 600; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 96px);
    grid-template-rows: repeat(3, 96px);
    gap: 8px;
    background: rgba(255, 46, 151, 0.25);
    padding: 8px;
    border-radius: 14px;
    box-shadow: 0 0 24px var(--line), inset 0 0 18px rgba(0,240,255,.2);
  }
  .cell {
    background: rgba(11, 4, 32, 0.95);
    border: 1px solid rgba(0,240,255,.25);
    border-radius: 10px;
    font-family: inherit;
    font-size: 3rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: transform .08s ease, background .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover:not(:disabled) { background: rgba(0,240,255,.12); transform: translateY(-2px); box-shadow: 0 0 14px rgba(0,240,255,.4); }
  .cell:disabled { cursor: default; }
  .cell.x { color: var(--x); text-shadow: 0 0 10px var(--x), 0 0 20px var(--x); }
  .cell.o { color: var(--o); text-shadow: 0 0 10px var(--o), 0 0 20px var(--o); }
  .cell.win { background: var(--accent); color: #fff; box-shadow: 0 0 26px var(--accent); animation: winPulse .7s ease-in-out infinite; }
  @keyframes winPulse { 50% { box-shadow: 0 0 42px var(--accent); } }
  .cell.selected { outline: 3px solid var(--neon); outline-offset: -3px; box-shadow: 0 0 18px var(--neon); }
  .markBtn.selected { background: var(--neon); color: #0b0420; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #status { text-shadow: 0 0 8px var(--neon); }
  .score { display: flex; gap: 20px; font-size: .95rem; }
  .score span { opacity: .9; }
  .score b { font-size: 1.2rem; color: var(--neon); text-shadow: 0 0 8px var(--neon); }
</style>
</head>
<body data-theme="plain">

  <!-- Retro-futuristic background layers -->
  <div class="bg"></div>
  <div class="sun"></div>
  <div class="grid"></div>
  <div class="scanlines"></div>
  <div id="particles"></div>
  <div id="cobwebs" aria-hidden="true">
    <span class="web tl"></span><span class="web tr"></span>
    <span class="web bl"></span><span class="web br"></span>
  </div>

  <!-- TITLE SCREEN -->
  <div class="screen active" id="titleScreen">
    <h1>TIC-TAC-TOE</h1>
    <p class="subtitle">A classic, reborn.</p>
    <div class="menu">
      <button class="btn" id="startBtn">Start</button>
      <button class="btn ghost" id="statsBtn">Stats</button>
      <button class="btn ghost" id="settingsBtn">Settings</button>
    </div>
  </div>

  <!-- STATS SCREEN -->
  <div class="screen" id="statsScreen">
    <h1>Stats</h1>
    <p class="subtitle">vs. AI</p>
    <div class="statsList" id="statsList"></div>
    <div class="menu">
      <button class="btn ghost" id="resetStats">Reset Stats</button>
      <button class="btn ghost" id="statsBack">← Back</button>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div class="screen" id="settingsScreen">
    <h1>Settings</h1>
    <div class="setting">
      <label for="volume">Volume: <span id="volLabel">60%</span></label>
      <input type="range" id="volume" min="0" max="100" value="60">
    </div>
    <div class="setting">
      <label>Theme</label>
      <div class="themeGrid" id="themeGrid"></div>
    </div>
    <button class="btn ghost" id="settingsBack">← Back</button>
  </div>

  <!-- MODE SELECT SCREEN -->
  <div class="screen" id="modeScreen">
    <h1>Choose a Mode</h1>
    <div class="menu">
      <button class="btn" id="modeAI">Play with AI</button>
      <button class="btn" id="modePvP">2 Player</button>
      <button class="btn ghost" id="backToTitle">← Back</button>
    </div>
  </div>

  <!-- DIFFICULTY SCREEN -->
  <div class="screen" id="diffScreen">
    <h1>Select Difficulty</h1>
    <div class="menu">
      <button class="btn" id="diffEasy">Easy</button>
      <button class="btn" id="diffMedium">Medium</button>
      <button class="btn" id="diffHard">Hard</button>
      <button class="btn" id="diffImpossible">Impossible</button>
      <button class="btn ghost" id="backToMode">← Back</button>
    </div>
  </div>

  <!-- GAME MODE SCREEN -->
  <div class="screen" id="gmScreen">
    <h1>Game Mode</h1>
    <div class="menu">
      <button class="btn" data-gm="classic">Classic</button>
      <button class="btn" data-gm="reverse">Reverse</button>
      <button class="btn" data-gm="wild">Wild</button>
      <button class="btn ghost" id="gmBack">← Back</button>
    </div>
    <p class="subtitle" id="gmHint" style="max-width: 360px; min-height: 2.4em;">Classic 3-in-a-row.</p>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    <div class="score" id="scoreRow"></div>
    <div id="status">Your move.</div>
    <p class="subtitle" id="modeHint" style="min-height: 1.2em; max-width: 360px;"></p>
    <div id="board"></div>
    <div id="wildBar" class="controls" style="display: none;">
      <span style="opacity: .8;">Place:</span>
      <button class="btn ghost markBtn" data-mark="X">X</button>
      <button class="btn ghost markBtn" data-mark="O">O</button>
    </div>
    <div class="controls">
      <button class="btn ghost" id="reset">New Game</button>
      <button class="btn ghost" id="swap"></button>
      <button class="btn ghost" id="menuBtn">Main Menu</button>
    </div>
  </div>

<script>
const HUMAN = "X", AI = "O", EMPTY = "";
let WINS = [];

let board, gameOver, lockInput, mode, current, secondStarts, difficulty;
let size = 3, gameMode = "classic", wildMark = "X", selected = -1;
const score = { x: 0, o: 0, d: 0 };

function other(p) { return p === "X" ? "O" : "X"; }
function playerName(sym) {
  if (mode === "ai") return sym === HUMAN ? "You" : "AI";
  return sym === "X" ? "Player 1" : "Player 2";
}

// Every 3-in-a-row segment (horizontal, vertical, both diagonals) anywhere on an n×n board.
// On 3×3 this is the classic 8 lines; on 4×4/5×5 you still win with just 3 in a row.
function computeWins(n) {
  const k = 3;
  const lines = [];
  const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      for (const [dr, dc] of dirs) {
        const er = r + (k - 1) * dr, ec = c + (k - 1) * dc;
        if (er < 0 || er >= n || ec < 0 || ec >= n) continue;
        const line = [];
        for (let s = 0; s < k; s++) line.push((r + s * dr) * n + (c + s * dc));
        lines.push(line);
      }
    }
  }
  return lines;
}

// ---- Screen management ----
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.getElementById("startBtn").onclick = () => { sfx("nav"); showScreen("modeScreen"); };
document.getElementById("statsBtn").onclick = () => { sfx("nav"); renderStats(); showScreen("statsScreen"); };
document.getElementById("statsBack").onclick = () => { sfx("nav"); showScreen("titleScreen"); };
document.getElementById("settingsBtn").onclick = () => { sfx("nav"); showScreen("settingsScreen"); };
document.getElementById("settingsBack").onclick = () => { sfx("nav"); showScreen("titleScreen"); };
document.getElementById("backToTitle").onclick = () => { sfx("nav"); showScreen("titleScreen"); };
document.getElementById("backToMode").onclick = () => { sfx("nav"); showScreen("modeScreen"); };
document.getElementById("menuBtn").onclick = () => { sfx("nav"); showScreen("modeScreen"); };

// Mode → (AI: difficulty) → game mode → (Classic only: board size) → game
document.getElementById("modeAI").onclick = () => { sfx("nav"); mode = "ai"; showScreen("diffScreen"); };
document.getElementById("modePvP").onclick = () => { sfx("nav"); mode = "pvp"; showScreen("gmScreen"); };

const pickDiff = (d) => { sfx("nav"); difficulty = d; showScreen("gmScreen"); };
document.getElementById("diffEasy").onclick = () => pickDiff("easy");
document.getElementById("diffMedium").onclick = () => pickDiff("medium");
document.getElementById("diffHard").onclick = () => pickDiff("hard");
document.getElementById("diffImpossible").onclick = () => pickDiff("impossible");

// Game mode selection (Classic supports board sizes; the variants are 3×3 only)
const GM_HINTS = {
  classic: "Classic 3-in-a-row.",
  reverse: "Misère: complete 3-in-a-row and you LOSE.",
  wild: "Place either X or O each turn — complete any line to win.",
};
document.querySelectorAll("#gmScreen [data-gm]").forEach(b => {
  b.onmouseenter = () => { document.getElementById("gmHint").textContent = GM_HINTS[b.dataset.gm]; };
  b.onclick = () => {
    sfx("nav");
    gameMode = b.dataset.gm;
    size = 3;
    WINS = computeWins(size);
    startGame();
  };
});
document.getElementById("gmBack").onclick = () => { sfx("nav"); showScreen(mode === "ai" ? "diffScreen" : "modeScreen"); };

// ---- Safe storage (localStorage throws on file:// "opaque origins") ----
const store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};

// ---- Stats (persisted; win/loss tracked from games vs AI) ----
let stats = { turns: 0, wins: 0, losses: 0, draws: 0 };
(function loadStats() {
  try { Object.assign(stats, JSON.parse(store.get("ttt_stats")) || {}); } catch (e) {}
})();
function saveStats() { store.set("ttt_stats", JSON.stringify(stats)); }

function renderStats() {
  const decided = stats.wins + stats.losses + stats.draws;
  const rate = decided ? Math.round((stats.wins / decided) * 100) : 0;
  const rows = [
    ["Turns Played", stats.turns],
    ["Wins", stats.wins],
    ["Losses", stats.losses],
    ["Draws", stats.draws],
    ["Win Rate", rate + "%"],
  ];
  document.getElementById("statsList").innerHTML = rows.map(([l, v]) =>
    `<div class="stat-row"><span class="label">${l}</span><span class="value">${v}</span></div>`).join("");
}

document.getElementById("resetStats").onclick = () => {
  sfx("nav");
  stats = { turns: 0, wins: 0, losses: 0, draws: 0 };
  saveStats();
  renderStats();
};

// ---- Audio (WebAudio synth blips, no files needed) ----
let audioCtx, volume = 0.6;
function ensureAudio() {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

// Per-theme sound flavor: a waveform + pitch shift. Same events, different timbre.
const SOUND = {
  plain:     { wave: "sine",     mult: 1.0 },   // clean
  synthwave: { wave: "sawtooth", mult: 1.0 },   // retro buzz
  christmas: { wave: "triangle", mult: 1.5 },   // bright, bell-like
  halloween: { wave: "sine",     mult: 0.66 },  // low, eerie
  sakura:    { wave: "triangle", mult: 1.25 },  // soft, higher
  matrix:    { wave: "square",   mult: 0.9 },    // digital blip
};
let curSound = SOUND.plain;

// Per-theme win melodies — distinct tunes, played with the theme's waveform.
const N = { C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880, B5:987.77, C6:1046.5,
            F4:349.23, G4:392, A4:440, D4:293.66 };
const WIN_MELODY = {
  plain:     [[N.C5,0,.18],[N.E5,.10,.18],[N.G5,.20,.30]],                          // C–E–G
  synthwave: [[N.C5,0,.12],[N.E5,.10,.12],[N.G5,.20,.12],[N.C6,.30,.28]],           // rising arpeggio
  christmas: [[N.E5,0,.14],[N.E5,.16,.14],[N.E5,.32,.26],[N.G5,.52,.30]],           // "jingle bells" run
  halloween: [[N.A4,0,.16],[N.G4,.18,.16],[N.F4,.36,.16],[N.D4,.54,.40]],           // descending, ominous
  sakura:    [[N.C5,0,.14],[N.D5,.14,.14],[N.E5,.28,.14],[N.G5,.42,.14],[N.A5,.56,.30]], // pentatonic up
  matrix:    [[N.G4,0,.10],[N.C5,.10,.10],[N.E5,.20,.10],[N.G5,.30,.24]],           // blippy climb
};

// One soft, enveloped note — gentle fade-in/out so there's no clicky "pop".
// useMult=false keeps the exact pitch (used for composed win melodies).
function note(freq, start, dur, level, useMult = true) {
  const t0 = audioCtx.currentTime + start;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = curSound.wave;
  osc.frequency.value = useMult ? freq * curSound.mult : freq;
  // square/saw are harsher, so trim their level a touch
  const trim = (curSound.wave === "square" || curSound.wave === "sawtooth") ? 0.6 : 1;
  const peak = volume * level * trim;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.015);        // smooth attack
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);        // smooth release
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}

function sfx(type) {
  if (volume <= 0) return;
  try {
    ensureAudio();
    switch (type) {
      case "move": note(523.25, 0, 0.12, 0.05); break;             // soft C5 tap
      case "ai":   note(392.00, 0, 0.14, 0.045); break;            // lower G4
      case "nav":  note(659.25, 0, 0.10, 0.035); break;            // light E5 tick
      case "draw": note(293.66, 0, 0.30, 0.05); break;             // low D4
      case "win": {                                                 // per-theme melody
        const mel = WIN_MELODY[document.body.dataset.theme] || WIN_MELODY.plain;
        mel.forEach(([f, s, d]) => note(f, s, d, 0.05, false));
        break;
      }
    }
  } catch (e) {}
}

const volSlider = document.getElementById("volume");
const volLabel = document.getElementById("volLabel");
volSlider.addEventListener("input", () => {
  volume = volSlider.value / 100;
  volLabel.textContent = volSlider.value + "%";
  store.set("ttt_vol", volSlider.value);
});

// ---- Themes ----
const THEMES = [
  { id: "plain",     name: "Plain",     particle: null },
  { id: "synthwave", name: "Synthwave", particle: null },
  { id: "christmas", name: "Christmas", particle: ["❄", "❅", "❆"] },
  { id: "halloween", name: "Halloween", particle: ["🦇", "🎃", "👻"] },
  { id: "sakura",    name: "Sakura",    particle: ["🌸", "🌷"] },
  { id: "matrix",    name: "Matrix",    particle: ["0", "1", "ﾊ", "ﾋ", "ﾎ"] },
];

let particleTimer = null;
const particlesEl = document.getElementById("particles");

// Corner cobweb SVG (shown only for the Halloween theme via CSS)
const WEB_SVG = `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="rgba(225,225,235,0.5)" stroke-width="1.2">
    <path d="M0 0H160M0 0L150 62M0 0L113 113M0 0L62 150M0 0V160"/>
    <path d="M34 0Q26 26 0 34M70 0Q52 52 0 70M106 0Q78 78 0 106M150 0Q110 110 0 150"/>
  </g></svg>`;
document.querySelectorAll("#cobwebs .web").forEach(el => { el.innerHTML = WEB_SVG; });

function applyTheme(id) {
  const theme = THEMES.find(t => t.id === id) || THEMES[0];
  document.body.dataset.theme = theme.id;
  curSound = SOUND[theme.id] || SOUND.plain;
  store.set("ttt_theme", theme.id);
  document.querySelectorAll(".theme-swatch").forEach(s =>
    s.classList.toggle("selected", s.dataset.id === theme.id));

  // restart particle effect
  clearInterval(particleTimer);
  particlesEl.innerHTML = "";
  if (theme.particle) {
    particleTimer = setInterval(() => spawnParticle(theme), 280);
  }
}

function spawnParticle(theme) {
  const el = document.createElement("div");
  el.className = "particle";
  const glyphs = theme.particle;
  el.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
  const size = 12 + Math.random() * 22;
  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = size + "px";
  el.style.opacity = 0.5 + Math.random() * 0.5;
  el.style.setProperty("--spin", (Math.random() * 720 - 360) + "deg");
  const dur = 4 + Math.random() * 5;
  el.style.animationDuration = dur + "s";
  if (theme.id === "matrix") { el.style.color = "var(--neon)"; el.style.textShadow = "0 0 8px var(--neon)"; }
  particlesEl.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 200);
}

// build theme swatches
const themeGrid = document.getElementById("themeGrid");
THEMES.forEach(t => {
  const b = document.createElement("button");
  b.className = "theme-swatch";
  b.dataset.id = t.id;
  b.textContent = t.name;
  b.onclick = () => { applyTheme(t.id); sfx("nav"); };  // apply first so the blip previews the new theme
  themeGrid.appendChild(b);
});

// restore saved settings
(function loadSettings() {
  const v = store.get("ttt_vol");
  if (v !== null) { volSlider.value = v; volume = v / 100; volLabel.textContent = v + "%"; }
  applyTheme(store.get("ttt_theme") || "plain");
})();

// ---- Board setup ----
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");
const scoreRow = document.getElementById("scoreRow");
const swapBtn = document.getElementById("swap");
const cells = [];

// Build an n×n grid of cells, sized to fit the board.
function buildBoard(n) {
  const px = n === 3 ? 96 : n === 4 ? 74 : 58;
  const fontRem = n === 3 ? 3 : n === 4 ? 2.2 : 1.7;
  boardEl.innerHTML = "";
  cells.length = 0;
  boardEl.style.gridTemplateColumns = `repeat(${n}, ${px}px)`;
  boardEl.style.gridTemplateRows = `repeat(${n}, ${px}px)`;
  for (let i = 0; i < n * n; i++) {
    const b = document.createElement("button");
    b.className = "cell";
    b.style.fontSize = fontRem + "rem";
    b.addEventListener("click", () => cellClick(i));
    boardEl.appendChild(b);
    cells.push(b);
  }
}

document.getElementById("reset").onclick = () => newGame(secondStarts);
swapBtn.onclick = () => { secondStarts = !secondStarts; updateSwapLabel(); newGame(secondStarts); };

function resetScore() { score.x = 0; score.o = 0; score.d = 0; secondStarts = false; }

// AI mode only: toggle showing who starts. Hidden in 2-player mode.
function updateSwapLabel() {
  if (mode === "ai") {
    swapBtn.style.display = "";
    swapBtn.textContent = secondStarts ? "AI goes first" : "You go first";
  } else {
    swapBtn.style.display = "none";
  }
}

function startGame() {
  WINS = computeWins(size);
  resetScore();
  buildBoard(size);
  setupModeUI();
  updateSwapLabel();
  showScreen("gameScreen");
  newGame(secondStarts);
}

const MODE_HINTS = {
  classic: "",
  reverse: "Avoid 3-in-a-row — complete a line and you LOSE.",
  wild: "Each turn, place either X or O. Complete any line to win.",
};
function setupModeUI() {
  document.getElementById("wildBar").style.display = gameMode === "wild" ? "" : "none";
  document.getElementById("modeHint").textContent = MODE_HINTS[gameMode] || "";
}

// ---- Win detection ----
// Raw line owner (symbol) and full-board draw — symbol-based.
function lineWinnerSym(b) {
  for (const line of WINS) {
    const f = b[line[0]];
    if (f && line.every(i => b[i] === f)) return { sym: f, line };
  }
  return null;
}
// Result after `mover` just played: applies Reverse (completing a line loses).
function resultFor(mover) {
  const w = lineWinnerSym(board);
  if (w) {
    const winner = gameMode === "reverse" ? other(mover) : mover;
    return { who: winner, line: w.line };
  }
  if (!board.includes(EMPTY)) return { who: "draw", line: null };
  return null;
}

function render(winLine) {
  board.forEach((v, i) => {
    let cls = "cell" + (v === "X" ? " x" : v === "O" ? " o" : "");
    if (i === selected) cls += " selected";
    cells[i].className = cls;
    cells[i].textContent = v;
    cells[i].disabled = !cellEnabled(i);
  });
  if (winLine) winLine.forEach(i => cells[i].classList.add("win"));
  document.querySelectorAll(".markBtn").forEach(b => b.classList.toggle("selected", b.dataset.mark === wildMark));

  const modeLabel = gameMode.charAt(0).toUpperCase() + gameMode.slice(1);
  if (mode === "ai") {
    const lvl = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
    scoreRow.innerHTML = `<span>You (X): <b>${score.x}</b></span>
      <span>AI · ${lvl} (O): <b>${score.o}</b></span><span>Draws: <b>${score.d}</b></span>`;
  } else {
    scoreRow.innerHTML = `<span>Player 1 (X): <b>${score.x}</b></span>
      <span>Player 2 (O): <b>${score.o}</b></span><span>Draws: <b>${score.d}</b></span>`;
  }
  scoreRow.innerHTML += `<span style="margin-left:auto;">Gamemode: ${modeLabel}</span>`;
}

// Is cell i clickable right now (mode/turn aware)?
function cellEnabled(i) {
  if (gameOver || lockInput) return false;
  if (mode === "ai" && current === AI) return false;
  return board[i] === EMPTY;
}

// ---- Move application ----
function place(i, mark, mover) {
  board[i] = mark;
  sfx("move");
  stats.turns++;
  saveStats();
  const res = resultFor(mover);
  if (res) return finish(res);
  current = other(current);
  selected = -1;
  if (mode === "ai" && current === AI) { render(); aiMove(); }
  else { turnText(); render(); }
}

function cellClick(i) {
  if (!cellEnabled(i)) return;
  place(i, gameMode === "wild" ? wildMark : current, current);
}

document.querySelectorAll(".markBtn").forEach(b =>
  b.onclick = () => { wildMark = b.dataset.mark; sfx("nav"); render(); });

function finish(res) {
  gameOver = true;
  sfx(res.who === "draw" ? "draw" : "win");
  if (mode === "ai") {
    if (res.who === "draw") stats.draws++;
    else if (res.who === HUMAN) stats.wins++;
    else stats.losses++;
    saveStats();
  }
  if (res.who === "draw") { statusEl.textContent = "It's a draw."; score.d++; }
  else {
    score[res.who.toLowerCase()]++;
    if (mode === "ai") statusEl.textContent = res.who === HUMAN ? "You win! 🎉" : "The AI wins!";
    else statusEl.textContent = `${playerName(res.who)} wins! 🎉`;
  }
  selected = -1;
  render(res.line);
}

function baseTurnText() {
  if (mode === "ai") return current === HUMAN ? "Your move." : "AI is thinking...";
  return `${playerName(current)}'s turn.`;
}
function turnText() { statusEl.textContent = baseTurnText(); }

// ---------- AI ----------
function randomMove() {
  const open = board.map((v, i) => v === EMPTY ? i : -1).filter(i => i >= 0);
  return open[Math.floor(Math.random() * open.length)];
}
function center() { return Math.floor((size * size) / 2); }

// Optimal minimax (Classic & Reverse, 3×3) — mover-aware so Reverse flips correctly.
function terminalScore(b, mover) {
  const w = lineWinnerSym(b);
  if (w) { const winner = gameMode === "reverse" ? other(mover) : mover; return winner === AI ? 1 : -1; }
  if (!b.includes(EMPTY)) return 0;
  return null;
}
function minimax(b, player) {
  let best = player === AI ? -2 : 2;
  for (let i = 0; i < b.length; i++) {
    if (b[i] !== EMPTY) continue;
    b[i] = player;
    const t = terminalScore(b, player);
    const s = t !== null ? t : minimax(b, other(player));
    b[i] = EMPTY;
    best = player === AI ? Math.max(best, s) : Math.min(best, s);
  }
  return best;
}
function minimaxCell() {
  let bestScore = -2, move = randomMove();
  for (let i = 0; i < board.length; i++) {
    if (board[i] !== EMPTY) continue;
    board[i] = AI;
    const t = terminalScore(board, AI);
    const s = t !== null ? t : minimax(board, HUMAN);
    board[i] = EMPTY;
    if (s > bestScore) { bestScore = s; move = i; }
  }
  return move;
}

// Classic heuristics for larger boards
function findWinningPlace(player) {
  for (let i = 0; i < board.length; i++) {
    if (board[i] !== EMPTY) continue;
    board[i] = player;
    const w = lineWinnerSym(board);
    board[i] = EMPTY;
    if (w && w.sym === player) return i;
  }
  return -1;
}
function heuristicCell() {
  let best = -Infinity, move = randomMove();
  for (let i = 0; i < board.length; i++) {
    if (board[i] !== EMPTY) continue;
    let s = 0;
    for (const line of WINS) {
      if (!line.includes(i)) continue;
      let ai = 0, hu = 0;
      for (const j of line) { if (board[j] === AI) ai++; else if (board[j] === HUMAN) hu++; }
      if (ai > 0 && hu > 0) continue;
      if (hu === 0) s += Math.pow(10, ai); else s += Math.pow(10, hu) * 0.8;
    }
    if (s > best) { best = s; move = i; }
  }
  return move;
}
function bestCell() {
  if (size === 3) return minimaxCell();                 // optimal for Classic & Reverse on 3×3
  let m = findWinningPlace(AI); if (m >= 0) return m;    // Classic, bigger boards
  m = findWinningPlace(HUMAN); if (m >= 0) return m;
  return heuristicCell();
}
function pickCell() {
  const r = Math.random();
  if (difficulty === "impossible") return bestCell();
  if (difficulty === "hard") return r < 0.8 ? bestCell() : randomMove();
  if (difficulty === "medium") return r < 0.5 ? bestCell() : randomMove();
  return randomMove();
}

// Wild AI: take a winning placement; otherwise build while not handing over a win.
function wildPlay() {
  if (difficulty === "easy") { board[randomMove()] = Math.random() < 0.5 ? "X" : "O"; return; }
  for (let i = 0; i < board.length; i++) {
    if (board[i] !== EMPTY) continue;
    for (const mk of ["X", "O"]) { board[i] = mk; const w = lineWinnerSym(board); board[i] = EMPTY; if (w) { board[i] = mk; return; } }
  }
  let best = -Infinity, choice = null;
  for (let i = 0; i < board.length; i++) {
    if (board[i] !== EMPTY) continue;
    for (const mk of ["X", "O"]) {
      board[i] = mk;
      let gives = false;                                 // does this let the opponent win next?
      for (let j = 0; j < board.length && !gives; j++) {
        if (board[j] !== EMPTY) continue;
        for (const mk2 of ["X", "O"]) { board[j] = mk2; if (lineWinnerSym(board)) gives = true; board[j] = EMPTY; if (gives) break; }
      }
      let s = (i === center() ? 2 : 0);
      for (const line of WINS) if (line.includes(i)) { let same = 0, bad = 0; for (const k of line) { if (board[k] === mk) same++; else if (board[k] !== EMPTY) bad++; } if (bad === 0) s += same; }
      if (gives) s -= 1000;
      board[i] = EMPTY;
      if (s > best) { best = s; choice = { i, mk }; }
    }
  }
  if (!choice) choice = { i: randomMove(), mk: Math.random() < 0.5 ? "X" : "O" };
  board[choice.i] = choice.mk;
}

function aiMove() {
  lockInput = true;
  turnText();
  render();
  setTimeout(() => {
    if (gameMode === "wild") wildPlay();
    else board[pickCell()] = AI;
    sfx("ai");
    lockInput = false;
    const res = resultFor(AI);
    if (res) return finish(res);
    current = HUMAN;
    selected = -1;
    turnText();
    render();
  }, 350);
}

function newGame(secondFirst) {
  board = Array(size * size).fill(EMPTY);
  gameOver = false;
  lockInput = false;
  selected = -1;
  wildMark = "X";
  current = secondFirst ? "O" : "X";
  turnText();
  render();
  if (mode === "ai" && current === AI) aiMove();
}
</script>
</body>
</html>
